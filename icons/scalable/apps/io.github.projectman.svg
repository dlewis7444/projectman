<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded dark background -->
  <rect width="512" height="512" rx="88" fill="#1e1e2e"/>

  <!-- Hammer (drawn first so anvil covers the handle bottom) -->
  <g transform="translate(210,128) rotate(30)">
    <!-- Handle -->
    <rect x="-14" y="40" width="28" height="148" rx="7" fill="#5a9506"/>
    <!-- Head -->
    <rect x="-62" y="-42" width="124" height="82" rx="16" fill="#8ce10b"/>
  </g>

  <!-- Anvil (drawn on top — naturally hides the handle end) -->
  <!-- Top slab -->
  <rect x="110" y="272" width="262" height="56" rx="10" fill="#c4c4d8"/>
  <!-- Horn -->
  <polygon points="328,272 444,299 328,328" fill="#c4c4d8"/>
  <!-- Waist -->
  <rect x="170" y="328" width="142" height="74" fill="#9898ac"/>
  <!-- Base -->
  <rect x="120" y="402" width="242" height="55" rx="10" fill="#9898ac"/>
</svg>
